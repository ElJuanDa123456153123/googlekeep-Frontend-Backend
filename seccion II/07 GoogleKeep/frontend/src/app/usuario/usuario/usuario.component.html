        <div class="card flex justify-center">
            <!-- <p-button (click)="showDialog()" label="Show" /> -->
            <p-dialog header="Usuario" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
                <span class="p-text-secondary block mb-8">Registra nuevos usuarios.</span>
                <div class="flex items-center gap-4 mb-4">
                    <label for="username" class="font-semibold w-24">Username</label>
                    <input pInputText id="username" class="flex-auto" autocomplete="off" [(ngModel)] = "entity().name" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="email" class="font-semibold w-24">Email</label>
                    <input pInputText id="email" class="flex-auto" autocomplete="off" [(ngModel)] = "entity().email" />
                </div>
                <div class="flex items-center gap-4 mb-8">
                    <label for="password" class="font-semibold w-24">Password</label>
                    <input pInputText id="password" class="flex-auto" type="password" autocomplete="off" [(ngModel)] = "entity().password" />
                </div>
                <div class="flex justify-end gap-2">
                    <p-button label="Cancel" severity="secondary" (click)="closeDialog()" />
                    <p-button label="Save" (click)="saveMethod()" />
                </div>
            </p-dialog>
        </div>
        <div class="card flex justify-center">
            <p-dialog header="Eliminar Usuario" [modal]="true" [(visible)]="visibleEliminar" [style]="{ width: '25rem' }">
                <div class="flex items-center gap-4 mb-8">
                    <i class="pi pi-exclamation-triangle" style="font-size: 3rem; color: #ef4444;"></i>
                    <span>¿Está seguro de eliminar a <strong>{{ entityToDelete()?.name }}</strong>?</span>
                </div>
                <div class="flex justify-end gap-2">
                    <p-button label="Cancelar" severity="secondary" (click)="closeDialogEliminar()" />
                    <p-button label="Eliminar" severity="danger" (click)="confirmarEliminar()" />
                </div>
            </p-dialog>
        </div>
