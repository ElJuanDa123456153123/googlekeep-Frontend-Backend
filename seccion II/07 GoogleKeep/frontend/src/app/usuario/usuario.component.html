    <div class="card">
        <h1>Hola mundo</h1>

        <div class="card flex justify-center">
            <p-datepicker
            [(ngModel)] = "date"/>
        </div>

        <p-table [value]="dataUsuarios" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template #header>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Fecha de Actualizacion</th>
                        <th>Acciones</th>
                    </tr>
                </ng-template>
                <ng-template #body let-item>
                    <tr>
                        <td>{{ item.Name }}</td>
                        <td>{{ item.Email }}</td>
                        <td>{{ item.update_at }}</td>
                        <td>
                            <button pButton type="button" label="Editar" class="p-button-rounded p-button-success"></button>
                            <button pButton type="button" label="Eliminar" class="p-button-rounded p-button-danger"></button>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
    </div>
